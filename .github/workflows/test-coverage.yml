name: Test Coverage Bot

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'

jobs:
  coverage-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=scripts --cov-report=json:coverage.json --cov-report=term-missing || true

      - name: Check coverage on changed files
        id: coverage
        run: |
          python -c "
          import json, subprocess, sys

          # Get changed Python files
          result = subprocess.run(
              ['git', 'diff', '--name-only', 'origin/main...HEAD', '--', 'scripts/*.py'],
              capture_output=True, text=True
          )
          changed = [f for f in result.stdout.strip().split('\n') if f.endswith('.py')]
          if not changed:
              print('No Python files changed in scripts/')
              sys.exit(0)

          # Load coverage data
          try:
              with open('coverage.json') as f:
                  cov = json.load(f)
          except FileNotFoundError:
              print('No coverage data')
              sys.exit(0)

          files = cov.get('files', {})
          threshold = 70  # percent

          low_coverage = []
          for cf in changed:
              if cf in files:
                  pct = files[cf]['summary']['percent_covered']
                  if pct < threshold:
                      low_coverage.append((cf, pct))
              else:
                  low_coverage.append((cf, 0))

          if low_coverage:
              print(f'Low coverage files ({len(low_coverage)}):')
              for f, pct in low_coverage:
                  print(f'  {f}: {pct:.0f}%')
              # Don't fail, just warn
              with open('coverage-report.txt', 'w') as f:
                  f.write(f'Low coverage on {len(low_coverage)} changed file(s):\n')
                  for ff, pct in low_coverage:
                      f.write(f'- \`{ff}\`: {pct:.0f}% (threshold: {threshold}%)\n')
          else:
              print('All changed files meet coverage threshold')
          "

      - name: Comment coverage report
        if: hashFiles('coverage-report.txt') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('coverage-report.txt', 'utf8');
            const body = `## 📊 Test Coverage\n\n${report}\n\nConsider adding tests for uncovered code.\n\n---\nGenerated by Test Coverage Bot`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
