name: Docs Update Bot

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'agents/**'
      - 'bootstrap/**'

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate CLI reference
        run: python scripts/generate_cli_ref.py > references/project-cli-generated.md

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet references/ CLAUDE.md AGENTS.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: auto-update CLI reference and documentation"
          title: "docs: auto-update documentation"
          body: |
            Automated documentation update triggered by changes in:
            - `scripts/` (CLI code)
            - `agents/` (skills, roles, stacks)
            - `bootstrap/` (bootstrap logic)

            Generated by CI docs bot.
          branch: docs/auto-update
          delete-branch: true
