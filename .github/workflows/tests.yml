name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest ruff mypy bandit

      - name: Lint (ruff)
        run: ruff check scripts/ tests/ bootstrap/

      - name: Type check (mypy)
        run: mypy scripts/ --ignore-missing-imports --no-error-summary || true

      - name: Security scan (bandit)
        run: bandit -r scripts/ -ll -q || true

      - name: Bootstrap .claude/ (required by mirror-sync tests)
        run: python bootstrap/bootstrap.py --no-detect --ide claude

      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_bootstrap_skills_coverage.py --ignore=tests/test_bootstrap_real.py
