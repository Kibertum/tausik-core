name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Lint is its OWN job, parallel to the tests. A hard ruff failure used to sit before
  # the pytest step in one job and hide every test result — that is how a Python 3.13
  # incompatibility shipped masked on a third of the matrix (v1.7.0). Decoupled, a red
  # lint no longer conceals a red (or green) test run. ruff/mypy/bandit are static and
  # version-independent, so this runs once, not across the 9-cell matrix.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install linters
        run: pip install ruff mypy bandit
      - name: Lint (ruff)
        run: ruff check scripts/ tests/ bootstrap/
      - name: Type check (mypy, advisory)
        run: mypy scripts/ --ignore-missing-imports --no-error-summary || true
      - name: Security scan (bandit, advisory)
        run: bandit -r scripts/ -ll -q || true

  # Fast lane across the full matrix. `pytest tests/` inherits addopts = -m 'not slow'
  # from pyproject, so this is the quick lane — broad platform/version coverage, ~5 min.
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test deps
        run: pip install pytest
      - name: Bootstrap .claude/ (required by mirror-sync tests)
        run: python bootstrap/bootstrap.py --no-detect --ide claude
      - name: Doc-constants drift check
        run: python scripts/gen_doc_constants.py --check
      - name: Run fast lane
        run: pytest tests/ -v --tb=short --ignore=tests/test_bootstrap_skills_coverage.py --ignore=tests/test_bootstrap_real.py

  # Full lane (slow tests INCLUDED) on one representative cell. The slow-marked tests are
  # the project's own critical regression tests (wiring, MCP integration, subprocess
  # smoke); the fast lane deselects them, so without this job CI would gate a green badge
  # over tests it never runs. ubuntu-3.13 is the cell where the last hidden failure lived.
  # One cell, ~17 min — 1x cost, not 9x — but the blind spot is closed.
  test-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install test deps
        run: pip install pytest
      - name: Bootstrap .claude/ (required by mirror-sync tests)
        run: python bootstrap/bootstrap.py --no-detect --ide claude
      - name: Doc-constants drift check
        run: python scripts/gen_doc_constants.py --check
      - name: Run FULL lane (fast + slow)
        run: pytest tests/ -m '' --tb=short --ignore=tests/test_bootstrap_skills_coverage.py --ignore=tests/test_bootstrap_real.py
