name: Security Review Bot

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'agents/**/mcp/**'
      - 'bootstrap/**'

jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install bandit

      - name: Run Bandit security scan
        id: bandit
        run: |
          bandit -r scripts/ -f json -o bandit-report.json -q || true
          echo "issues=$(python -c "import json; r=json.load(open('bandit-report.json')); print(len(r.get('results',[])))")" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: steps.bandit.outputs.issues != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('bandit-report.json', 'utf8'));
            const issues = report.results || [];

            let body = '## 🔒 Security Review\n\n';
            body += `Found **${issues.length}** security issue(s):\n\n`;

            for (const issue of issues.slice(0, 20)) {
              const severity = issue.issue_severity.toUpperCase();
              body += `- **[${severity}]** ${issue.issue_text}\n`;
              body += `  \`${issue.filename}:${issue.line_number}\`\n`;
              body += `  CWE: ${issue.issue_cwe?.id || 'N/A'}\n\n`;
            }

            if (issues.length > 20) {
              body += `\n... and ${issues.length - 20} more. Run \`bandit -r scripts/\` locally for full report.\n`;
            }

            body += '\n---\nGenerated by Security Review Bot';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Pass if no high-severity issues
        run: |
          python -c "
          import json, sys
          r = json.load(open('bandit-report.json'))
          high = [i for i in r.get('results', []) if i['issue_severity'] == 'HIGH']
          if high:
              print(f'Found {len(high)} HIGH severity issues')
              sys.exit(1)
          print('No HIGH severity issues found')
          "
