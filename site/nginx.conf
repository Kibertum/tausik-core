server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Keep redirect Location relative so upstream HTTPS scheme is preserved.
    # Behind a TLS-terminating reverse proxy, absolute redirects downgrade to http://.
    absolute_redirect off;

    # Custom 404 page
    error_page 404 /404.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # VitePress hashed assets — cache 1 year (filenames are content-hashed).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # RU locale subdirectory.
    # `$uri.html` is required because VitePress cleanUrls=true emits
    # `docs/quickstart.html` (single file), not `docs/quickstart/index.html`.
    location /ru/ {
        try_files $uri $uri.html $uri/ $uri/index.html =404;
    }

    # Text files — UTF-8 charset
    location ~* \.(txt|json)$ {
        charset utf-8;
        charset_types text/plain application/json;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Default fallback (EN locale at /). Same cleanUrls handling.
    location / {
        try_files $uri $uri.html $uri/ $uri/index.html =404;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss;
    gzip_min_length 256;
}
